name: CI

on:
  push:
    branches: [main, lexy/genesis]
  pull_request:
    branches: [main, lexy/genesis]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript strict check
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Next.js production build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://lexyflow.com
          NEXT_PUBLIC_APP_NAME: LexyFlow

      - name: Upload .next build for E2E
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            public
            messages
            package.json
            package-lock.json
            next.config.mjs
            playwright.config.ts
            e2e
            tsconfig.json
            src
            tailwind.config.ts
            postcss.config.mjs
          retention-days: 1

  e2e:
    name: Playwright · critical user flows
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run Playwright suite
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_APP_NAME: LexyFlow
          NEXT_PUBLIC_SUPABASE_URL: https://e2e.supabase.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key-not-real

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
